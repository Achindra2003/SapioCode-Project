services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      - NEXT_PUBLIC_AUTH_API_URL=http://auth-backend:8000
      - NEXT_PUBLIC_AI_API_URL=http://ai-backend:8003/api
      - AI_API_URL=http://ai-backend:8003/api
      - PORT=3001
    depends_on:
      - auth-backend
      - ai-backend

  auth-backend:
    build:
      context: ./backend/auth
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - MONGODB_URI=${MONGODB_URI}
      - JWT_SECRET=${JWT_SECRET}
      - FRONTEND_URL=http://localhost:3001

  ai-backend:
    build:
      context: ./backend/ai
      dockerfile: Dockerfile
    ports:
      - "8003:8003"
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - GROQ_BASE_URL=https://api.groq.com/openai/v1
      - GROQ_PRIMARY_MODEL=moonshotai/kimi-k2-instruct
      - GROQ_FALLBACK_MODEL=llama-3.3-70b-versatile
      - PORT=8003

networks:
  default:
    name: sapiocode-network
